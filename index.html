<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff7ee" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Двое на день" />
    <title>Двое на день</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css?v=27" />
  </head>
  <body>
    <img class="page-bg" id="pageBackground" src="https://images.unsplash.com/photo-1755127761449-47f246511c9a?auto=format&fit=crop&w=1200&q=75" alt="" />
    <main class="app-shell">
      <section class="hero" aria-label="Сегодняшнее задание">
        <div class="topbar">
          <div>
            <p class="eyebrow">Ежедневное приключение</p>
            <h1>Двое на день</h1>
          </div>
        </div>
        <article class="task-card" id="taskCard">
          <div class="card-head">
            <span class="pill" id="taskTag">На улице</span>
            <div class="card-tools">
              <button class="favorite-button" id="favoriteButton" type="button" aria-label="Добавить в избранное">
                <span aria-hidden="true">♡</span>
              </button>
              <span class="date" id="todayLabel"></span>
            </div>
          </div>
          <h2 id="taskTitle"></h2>
          <p id="taskText"></p>
          <div class="task-meta">
            <span id="timeMeta"></span>
            <span id="costMeta"></span>
            <span id="energyMeta"></span>
          </div>
          <div class="actions">
            <button class="primary" id="doneButton" type="button">Готово</button>
            <button class="secondary" id="shuffleButton" type="button" aria-label="Другое задание">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
        </article>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Настроение дня</h2>
          <button class="text-button" id="resetFilters" type="button">Сброс</button>
        </div>
        <div class="chips" id="moodChips" aria-label="Фильтр заданий"></div>
      </section>

      <section class="panel two-col">
        <div class="stat">
          <strong id="streakValue">0</strong>
          <span>дней вместе</span>
        </div>
        <div class="stat">
          <strong id="completedValue">0</strong>
          <span>выполнено</span>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Избранное</h2>
          <span class="counter" id="favoriteCount">0</span>
        </div>
        <ul class="custom-list" id="favoriteList"></ul>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Недавние</h2>
          <button class="text-button" id="clearHistory" type="button">Очистить</button>
        </div>
        <ul class="history" id="historyList"></ul>
      </section>
    </main>

    <section class="custom-view" id="customView" aria-hidden="true">
      <div class="custom-view-inner">
        <header class="custom-view-header">
          <button class="icon-button" id="closeCustomView" type="button" aria-label="Вернуться к заданию">
            <span aria-hidden="true">←</span>
          </button>
          <div>
            <p class="eyebrow">Ваша коллекция</p>
            <h2>Создать свой квест</h2>
          </div>
          <span class="counter" id="customCount">0</span>
        </header>

        <div class="custom-view-content">
          <form class="custom-task-form custom-task-editor" id="customTaskForm">
            <label class="field compact">
              <span>Название</span>
              <input id="customTitle" type="text" maxlength="42" placeholder="например, ночная прогулка" required />
            </label>
            <label class="field compact">
              <span>Описание</span>
              <textarea id="customText" maxlength="180" placeholder="Что нужно сделать вместе?" required></textarea>
            </label>
            <div class="field compact">
              <span>Категория</span>
              <div class="select-menu" id="customMoodMenu">
                <button class="select-menu-button" id="customMoodButton" type="button" aria-expanded="false" aria-controls="customMoodOptions">
                  <span id="customMoodLabel">Спокойно</span>
                  <span class="select-menu-chevron" aria-hidden="true"></span>
                </button>
                <div class="select-menu-options" id="customMoodOptions" role="listbox" aria-label="Категория своего задания" aria-hidden="true" inert>
                  <button class="selected" type="button" role="option" data-custom-mood="quiet" aria-selected="true">Спокойно</button>
                  <button type="button" role="option" data-custom-mood="outdoor" aria-selected="false">На воздухе</button>
                  <button type="button" role="option" data-custom-mood="home" aria-selected="false">Дома</button>
                  <button type="button" role="option" data-custom-mood="playful" aria-selected="false">Игра</button>
                  <button type="button" role="option" data-custom-mood="adventure" aria-selected="false">Спонтанно</button>
                </div>
                <input id="customMood" type="hidden" value="quiet" />
              </div>
            </div>
            <button class="primary add-button" type="submit">Добавить квест</button>
          </form>

          <section class="custom-collection" aria-labelledby="customCollectionTitle">
            <div class="section-title">
              <h3 id="customCollectionTitle">Мои квесты</h3>
            </div>
            <ul class="custom-list" id="customList"></ul>
          </section>
        </div>
      </div>
    </section>

    <nav class="bottom-nav" aria-label="Основная навигация">
      <button class="bottom-nav-item active" id="homeButton" type="button" aria-label="Главная" aria-current="page">
        <span class="nav-glyph" aria-hidden="true">⌂</span>
        <span>Главная</span>
      </button>
      <button class="quest-fab" id="openCustomView" type="button" aria-label="Создать свой квест">
        <span class="plus-icon" aria-hidden="true"></span>
      </button>
      <button class="bottom-nav-item" id="settingsButton" type="button" aria-label="Профиль и настройки">
        <span class="nav-glyph" aria-hidden="true">⚙</span>
        <span>Профиль</span>
      </button>
    </nav>

    <section class="profile-view" id="profileView" aria-hidden="true">
      <div class="profile-view-inner">
        <header class="profile-view-header">
          <p class="eyebrow">Только для вас двоих</p>
          <h2>Профиль и настройки</h2>
        </header>
        <form class="profile-form">
        <label class="field">
          <span>Ваше имя</span>
          <input id="yourName" type="text" maxlength="24" placeholder="например, Макс" />
        </label>
        <label class="field">
          <span>Имя партнера</span>
          <input id="partnerName" type="text" maxlength="24" placeholder="например, Аня" />
        </label>
        <label class="field">
          <span>Город или район</span>
          <input id="placeHint" type="text" maxlength="36" placeholder="например, Варшава" />
        </label>
        <label class="field">
          <span>Дата начала отношений</span>
          <input id="relationshipStart" type="date" />
        </label>
        <label class="toggle">
          <input id="quietMode" type="checkbox" />
          <span>Больше спокойных заданий</span>
        </label>
          <button class="primary full" id="saveSettings" type="button">Сохранить</button>
        </form>
      </div>
    </section>

    <dialog class="settings note-dialog" id="noteDialog">
      <form method="dialog">
        <div class="section-title">
          <h2>Как прошло?</h2>
          <button class="icon-button small" value="close" aria-label="Закрыть">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <p class="dialog-copy" id="noteTaskTitle"></p>
        <label class="field">
          <span>Заметка</span>
          <textarea id="completionNote" maxlength="220" placeholder="Одна фраза на память"></textarea>
        </label>
        <button class="primary full" id="saveNoteButton" value="save">Сохранить заметку</button>
      </form>
    </dialog>

    <script src="app.js?v=27"></script>
  </body>
</html>
